<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="명동역 로고">
  <defs>
    <clipPath id="ring"><circle cx="256" cy="256" r="248"/></clipPath>
    <style>
      .cjk{font-family:'Apple SD Gothic Neo','Hiragino Maru Gothic ProN','Noto Sans CJK JP','Noto Sans CJK KR',system-ui,sans-serif;font-weight:800}
      .lat{font-family:system-ui,'Helvetica Neue',Arial,sans-serif;font-weight:800}
    </style>
  </defs>

  <!-- white face -->
  <circle cx="256" cy="256" r="250" fill="#ffffff"/>

  <!-- blue middle band (taller, clipped to the circle) -->
  <g clip-path="url(#ring)">
    <rect x="0" y="168" width="512" height="176" fill="#29b6f6"/>
  </g>

  <!-- outer blue ring (covers the band edges) -->
  <circle cx="256" cy="256" r="229" fill="none" stroke="#29b6f6" stroke-width="38"/>

  <!-- station number -->
  <circle cx="256" cy="110" r="48" fill="#29b6f6"/>
  <text x="256" y="113" text-anchor="middle" dominant-baseline="middle" class="lat" font-size="50" fill="#ffffff">424</text>

  <!-- station name (Japanese) — as large as fits the band -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="middle" class="cjk" font-size="146" fill="#ffffff">明洞駅</text>

  <!-- romanized, two lines -->
  <text x="256" y="388" text-anchor="middle" dominant-baseline="middle" class="lat" font-size="40" fill="#1a1a1a">Myeong-dong</text>
  <text x="256" y="432" text-anchor="middle" dominant-baseline="middle" class="lat" font-size="40" fill="#1a1a1a">Station</text>
</svg>
